
include colors/colors.conf

font_family	JetBrainsMono Nerd Font Mono 
font_size	10

disable_ligatures no
disable_audio_bell no

shell fish
shell_intergration disabled

cursor_shape		block

url_style curly 
remember_window_size no
# intial_window_width	640
# initial_window_height	400
intial_window_width	78c
initial_window_height	23c
window_padding_width	27
cursor_blink_interval	0

background_opacity 0.80
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
confirm_os_window_close0

# -- performance settings
sync_to_monitor no

# -- perf
repaint_delay	8
input_delay	3

cursor_trail 3



# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
