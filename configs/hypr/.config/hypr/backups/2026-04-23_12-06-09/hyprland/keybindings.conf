###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, killactive,
bind = $mainMod, B, exec , helium-browser
bind = SUPER, T, exec, kitty
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Hyprshot
bind = , Print , exec, ~/.config/hypr/scripts/screenshot.sh
bind = SUPER, Print, exec, hyprshot -m output -m eDP-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# rofi launcher
bindr = SUPER, Super_L, exec, ~/.config/hypr/scripts/rofi-toggle.sh

# hyprscrolling
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod SHIFT, period, layoutmsg, swapcol r
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l

# hyprexpo
bind = , XF86LaunchA, hyprexpo:expo, toggle

# Blue Light Filter
bind = SUPER ALT, S, exec, pkill -SIGUSR2 hyprsunset

# Volume Controls
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
binde = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Brightness Control
binde = ,XF86MonBrightnessUp, exec, swayosd-client --brightness +5
binde = ,XF86MonBrightnessDown, exec, swayosd-client --brightness -5

# hyprbars toggle
bind = $mainMod, N, exec, ~/.config/hypr/scripts/toggle-hyprbars.sh

# reload waybar
bind = SUPER, G, exec, ls ~/.config/waybar/* | entr -rz waybar

# all switcher scripts
bind = $mainMod SHIFT, U, exec, pkill rofi || ~/.config/themes/wallpaper-selector.sh
bind = $mainMod, U, exec, pkill rofi || ~/.config/themes/rofi-launcher.sh
bind = SUPER ALT, U, exec, ~/.config/waybar/scripts/layout-picker.sh

# Full Screen
bind = , XF86Fullscreen, exec, hyprctl dispatch fullscreen

# toggle float
bind = SUPER, F, exec, hyprctl --batch "dispatch togglefloating ; dispatch centerwindow"

# AIO script
bind = SUPER, A, exec, ~/.config/hypr/scripts/main-menu.sh

# ALt Tab
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev

# config launcher
bind = $mainMod, C, exec, ~/.config/rofi/scripts/config-browser.sh
bind = $mainMod ALT, R, exec, ~/.config/hypr/scripts/reload_config.sh

# hyprlock / wlogout
bind = , XF86Sleep, exec, wlogout
bindo = , XF86Poweroff, exec, hyprshutdown

# quickshell binds
bind = SUPER, M, exec, ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = SUPER ALT, W, exec, ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
